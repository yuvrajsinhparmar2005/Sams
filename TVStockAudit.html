<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | TV Audit Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); display: flex; color: var(--text-main); }
        
        /* Main Content Layout */
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; min-height: 100vh; }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }

        .controls { display: flex; gap: 12px; align-items: center; }

        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .table-container { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #f1f5f9;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }

        tr:hover td { background-color: #f8fafc; }

        .method-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: #e0e7ff; color: #4338ca; }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }

        #error-message {
            display: none;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #loading { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="header-flex">
            <div>
                <h1 style="margin:0; font-size: 28px;">TV Audit Logs</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Verification records for True Value assets</p>
            </div>
            
            <div class="controls">
                <select id="city-filter" onchange="fetchTVLogs()">
                    <option value="">All Cities</option>
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Himmatnagar">Himmatnagar</option>
                    <option value="Vadaj">Vadaj</option>
                    <option value="Mehsana">Mehsana</option>
                </select>

                <button class="btn btn-success" onclick="downloadTVCSV()" id="download-btn">
                    <i class="fas fa-download"></i> Export CSV
                </button>

                <button class="btn btn-primary" onclick="fetchTVLogs()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div id="error-message"></div>

        <section class="table-container">
            <div id="loading">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Fetching from tv_audit...</p>
            </div>

            <table id="audit-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>ID Number</th>
                        <th>Auditor</th>
                        <th>Branch / City</th>
                        <th>Method</th>
                        <th>Remarks (Model)</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchTVLogs() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('audit-table');
            const tbody = document.getElementById('table-body');
            const errorBox = document.getElementById('error-message');
            const selectedCity = document.getElementById('city-filter').value;

            loading.style.display = "block";
            table.style.display = "none";
            errorBox.style.display = "none";
            tbody.innerHTML = "";

            try {
                let query = db.collection('tv_audit').orderBy('timestamp', 'desc');

                // Filter by city if selected
                if (selectedCity !== "") {
                    query = query.where('auditLocation_City', '==', selectedCity);
                }

                const snap = await query.get();

                if (snap.empty) {
                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:30px; color:gray;'>No audit records found.</td></tr>";
                } else {
                    snap.forEach(doc => {
                        const d = doc.data();
                        
                        let dateStr = "N/A";
                        if(d.timestamp) {
                            const dateObj = d.timestamp.toDate();
                            dateStr = `<b>${dateObj.toLocaleDateString('en-GB')}</b><br><small>${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;
                        }

                        const row = `
                            <tr>
                                <td>${dateStr}</td>
                                <td style="font-family:monospace; font-weight:700; color:var(--primary);">${d.idNumber || d.scannedData || '-'}</td>
                                <td style="font-weight:600;">${d.auditBy_Name || 'Unknown'}</td>
                                <td>
                                    ${d.auditLocation_Branch || 'N/A'}<br>
                                    <span style="font-size:12px; color:var(--text-muted)">${d.auditLocation_City || ''}</span>
                                </td>
                                <td><span class="method-badge">${(d.method || 'Manual').toUpperCase()}</span></td>
                                <td style="color:#475569; font-size:13px;">${d.remarks || '-'}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                }

                loading.style.display = "none";
                table.style.display = "table";

            } catch (error) {
                console.error("Error:", error);
                loading.style.display = "none";
                errorBox.style.display = "block";

                if (error.message.includes('index')) {
                    const indexLink = error.message.match(/(https?:\/\/[^\s]+)/g);
                    errorBox.innerHTML = `
                        <strong><i class="fas fa-exclamation-triangle"></i> Database Index Required</strong><br>
                        Click below to allow filtering by City for TV Audits:<br><br>
                        <a href="${indexLink ? indexLink[0] : '#'}" target="_blank" style="color:var(--primary); font-weight:bold;">
                           Generate TV Audit Index in Firebase
                        </a>`;
                } else {
                    errorBox.innerText = "Error: " + error.message;
                }
            }
        }

        async function downloadTVCSV() {
            const selectedCity = document.getElementById('city-filter').value;
            const btn = document.getElementById('download-btn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                let query = db.collection('tv_audit').orderBy('timestamp', 'desc');
                if (selectedCity !== "") {
                    query = query.where('auditLocation_City', '==', selectedCity);
                }

                const snap = await query.get();
                if (snap.empty) { alert("No data to export."); return; }

                let csvContent = "Date,Time,ID_Number,Auditor,City,Branch,Method,Remarks\n";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const dateObj = d.timestamp ? d.timestamp.toDate() : new Date();
                    const clean = (val) => `"${(val || '').toString().replace(/"/g, '""')}"`;
                    
                    csvContent += [
                        dateObj.toLocaleDateString('en-GB'),
                        dateObj.toLocaleTimeString(),
                        clean(d.idNumber || d.scannedData),
                        clean(d.auditBy_Name),
                        clean(d.auditLocation_City),
                        clean(d.auditLocation_Branch),
                        clean(d.method),
                        clean(d.remarks)
                    ].join(",") + "\n";
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `TV_Audit_${selectedCity || 'All'}_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();

            } catch (error) {
                alert("Export Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        window.onload = fetchTVLogs;
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
