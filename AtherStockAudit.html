<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Ather Audit Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #10b981; /* Ather Green */
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --border: #e2e8f0;
            --sidebar-width: 260px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background-color: var(--bg); display: flex; color: var(--text-main); letter-spacing: -0.01em; }
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 2rem 3rem; min-height: 100vh; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 1.5rem; border-radius: 16px; border: 1px solid var(--white); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .header-title h1 { margin: 0; font-size: 1.75rem; font-weight: 700; }
        .header-title p { margin: 0.25rem 0 0; color: var(--text-muted); font-size: 0.95rem; }

        .controls { display: flex; gap: 12px; align-items: center; }

        select { padding: 0.6rem 1rem; border-radius: 10px; border: 1px solid var(--border); background: var(--white); font-weight: 500; outline: none; cursor: pointer; }

        .table-card { background: var(--white); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1.25rem 1.5rem; background: #f1f5f9; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .vin-badge { font-family: monospace; font-weight: 700; color: #065f46; background: #d1fae5; padding: 4px 10px; border-radius: 6px; }

        .btn { padding: 0.75rem 1.25rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-primary { background: var(--primary); color: white; }

        #loading { padding: 5rem; text-align: center; color: var(--primary); }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <header class="page-header">
            <div class="header-title">
                <h1>Ather Audit Logs</h1>
                <p>Verify VIN records and manage local archives</p>
            </div>
            
            <div class="controls">
                <select id="city-filter" onchange="resetPagination()">
                    <option value="">All Cities</option>
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Vadaj">Vadaj</option>
                </select>

                <button class="btn btn-danger" onclick="freezeAtherData()" id="freeze-btn">
                    <i class="fas fa-snowflake"></i> Freeze & Clear
                </button>

                <button class="btn btn-primary" onclick="resetPagination()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </header>

        <section class="table-card">
            <div id="loading" style="display:none;">
                <i class="fas fa-spinner fa-spin fa-3x"></i>
                <p style="margin-top:1rem;">Fetching Ather records...</p>
            </div>

            <table id="audit-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Barcode / VIN</th>
                        <th>Auditor</th>
                        <th>Location</th>
                        <th>Method</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchAuditData() {
            const city = document.getElementById('city-filter').value;
            const tbody = document.getElementById('table-body');
            const loader = document.getElementById('loading');
            
            loader.style.display = 'block';
            tbody.innerHTML = "";

            try {
                let query = db.collection('Ather_Stock_Audit').orderBy('timestamp', 'desc');
                if(city) query = query.where('city', '==', city);
                
                const snap = await query.limit(30).get();
                if(snap.empty) tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:3rem;'>No Ather records.</td></tr>";

                snap.forEach(doc => {
                    const d = doc.data();
                    const dateObj = d.timestamp ? d.timestamp.toDate() : new Date();
                    tbody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>
                                <b>${dateObj.toLocaleDateString('en-GB')}</b><br>
                                <small style="color:var(--text-muted)">${dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
                            </td>
                            <td><span class="vin-badge">${d.barcode || 'N/A'}</span></td>
                            <td><div style="font-weight:600;">${d.auditor_name || 'Unknown'}</div></td>
                            <td><b>${d.city || '-'}</b><br><small>${d.branch || ''}</small></td>
                            <td>${(d.method || 'Scan').toUpperCase()}</td>
                            <td><div style="max-width:200px; font-size:0.85rem;">${d.remarks || '-'}</div></td>
                        </tr>
                    `);
                });
            } finally { loader.style.display = 'none'; }
        }

        async function freezeAtherData() {
            const city = document.getElementById('city-filter').value;
            const btn = document.getElementById('freeze-btn');
            const tbody = document.getElementById('table-body');
            
            if (!confirm(`Confirm: Move ${city || 'ALL'} Ather logs to local MySQL and DELETE from Firebase?`)) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Archiving...';

            try {
                let query = db.collection('Ather_Stock_Audit');
                if(city) query = query.where('city', '==', city);
                const snap = await query.get();

                if(snap.empty) { alert("Nothing to move!"); btn.disabled = false; return; }

                const records = [];
                const ids = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    records.push({ ...d, timestamp: d.timestamp ? d.timestamp.toDate().toISOString() : new Date().toISOString() });
                    ids.push(doc.id);
                });

                const response = await fetch('http://localhost/sams/Ather_Audit_Archive.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(records)
                });

                const result = await response.json();

                if (result.status === "success") {
                    const batch = db.batch();
                    ids.forEach(id => batch.delete(db.collection('Ather_Stock_Audit').doc(id)));
                    await batch.commit();

                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px; color:var(--primary); font-weight:700;'>Ather logs archived successfully. Firebase wiped.</td></tr>";
                    alert(result.message);
                } else { alert("Error: " + result.message); }
            } catch (err) { alert("Archive Failed. Check XAMPP."); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-snowflake"></i> Freeze & Clear'; }
        }

        window.onload = fetchAuditData;
        function resetPagination() { fetchAuditData(); }
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
