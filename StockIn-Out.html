<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Inventory Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); display: flex; color: var(--text-main); }

        /* --- FIXED SIDEBAR --- */
        .sidebar { 
            width: 260px; 
            background-color: var(--sidebar-bg); 
            height: 100vh; 
            color: white; 
            position: fixed; 
            left: 0; 
            top: 0;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar-header { 
            padding: 30px 20px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .nav-links { list-style: none; padding: 20px 0; margin: 0; }

        .nav-links li { 
            margin: 4px 15px; 
            border-radius: 10px; 
            transition: 0.2s;
        }

        .nav-links li:hover:not(.active) { background: var(--sidebar-hover); }
        .nav-links li.active { background: var(--primary); }

        .nav-links a { 
            text-decoration: none; 
            color: #94a3b8; 
            padding: 14px 15px; 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            font-weight: 500;
        }

        .nav-links li.active a { color: white; }
        .nav-links i { margin-right: 12px; width: 20px; text-align: center; font-size: 16px; }

        /* --- MAIN CONTENT ADJUSTMENT --- */
        .main-content { 
            margin-left: 260px; /* Must match sidebar width */
            flex-grow: 1; 
            padding: 40px; 
            min-height: 100vh;
        }

        /* --- TOP FILTER BAR --- */
        .filter-section {
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .filter-section label { font-weight: 700; color: var(--text-main); font-size: 14px; }

        select {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-weight: 600;
            color: var(--primary);
            outline: none;
            cursor: pointer;
            background-color: #f8fafc;
            transition: 0.2s;
        }
        select:hover { border-color: var(--primary); }

        /* --- TABLE STYLING --- */
        .table-container { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); 
            overflow-x: auto; 
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; min-width: 1000px; }
        th { text-align: left; padding: 10px 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        td { padding: 18px 15px; background: #fcfcfc; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        td:first-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; }

        .status-pill { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-in { background: #dcfce7; color: #15803d; }
        .status-out { background: #fee2e2; color: #b91c1c; }

        .do-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .do-img:hover { transform: scale(1.1); border-color: var(--primary); }

        #loading { text-align: center; padding: 40px; font-weight: 600; color: var(--primary); }
    </style>
</head>

<body>
   <aside style="width: 260px; background-color: #0f172a; height: 100vh; color: white; position: fixed; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1); z-index: 100; font-family: 'Inter', sans-serif;">
    <div style="padding: 40px 20px; text-align: center; font-size: 22px; font-weight: 800; letter-spacing: 3px; color: #ffffff; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">SAMS</div>
    <ul style="list-style: none; padding: 25px 0; margin: 0; flex-grow: 1;">
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="dashboard.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-chart-line" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Dashboard</a></li>
        <li style="margin: 8px 15px; border-radius: 12px; background-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);"><a href="StockIn-Out.html" style="text-decoration: none; color: white; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-exchange-alt" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center;"></i> Stock In & Out</a></li>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="StockAudit.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-clipboard-check" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Stock Audit</a></li>
        <div style="padding: 10px 30px; font-size: 11px; text-transform: uppercase; color: #475569; font-weight: 700; letter-spacing: 1px; margin-top: 20px;">Administration</div>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="AdminStockAudit.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-user-shield" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Admin Audit</a></li>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="UserAccess.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-users-cog" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> User Access</a></li>
    </ul>
</aside>

    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="margin:0; font-size: 24px;">Inventory Activity Logs</h1>
            <p style="color: var(--text-muted); margin-top: 5px;">Track all incoming and outgoing assets</p>
        </header>

        <div class="filter-section">
            <i class="fas fa-filter" style="color: var(--primary);"></i>
            <label>Filter View:</label>
            <select id="logFilter" onchange="fetchActivity()">
                <option value="all">All Transactions</option>
                <option value="stock_in">Stock In (Received)</option>
                <option value="stock_out">Stock Out (Dispatched)</option>
            </select>
        </div>

        <section class="table-container">
            <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading Data from Firebase...</div>
            <table id="activity-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Staff Name</th>
                        <th>Staff Branch</th>
                        <th>Type</th>
                        <th>Asset ID</th>
                        <th>Path (From/To)</th>
                        <th>DO Photo</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchActivity() {
            const filter = document.getElementById('logFilter').value;
            const loading = document.getElementById('loading');
            const table = document.getElementById('activity-table');
            const tbody = document.getElementById('table-body');

            loading.style.display = "block";
            table.style.display = "none";
            tbody.innerHTML = "";

            try {
                let allActivity = [];

                if (filter === "all" || filter === "stock_in") {
                    const snap = await db.collection('stock_in').orderBy('timestamp', 'desc').get();
                    snap.forEach(doc => {
                        const d = doc.data();
                        allActivity.push({
                            user: d.entryBy_UserName || "Unknown",
                            userLoc: `${d.entryBy_UserCity} (${d.entryBy_UserBranch})`,
                            type: "Stock In",
                            asset: d.barcodeData,
                            route: `From: ${d.comingFrom_Branch}`,
                            photo: d.doGatepassPhotoPath || "",
                            remark: d.remarks || "-",
                            time: d.timestamp ? d.timestamp.toDate() : new Date(),
                            cls: "status-in"
                        });
                    });
                }

                if (filter === "all" || filter === "stock_out") {
                    const snap = await db.collection('stock_out').orderBy('timestamp', 'desc').get();
                    snap.forEach(doc => {
                        const d = doc.data();
                        allActivity.push({
                            user: d.entryBy_UserName || "Unknown",
                            userLoc: `${d.entryBy_UserCity} (${d.entryBy_UserBranch})`,
                            type: "Stock Out",
                            asset: d.barcodeData,
                            route: `To: ${d.dispatchedTo_Branch}`,
                            photo: d.doGatepassPhotoPath || "",
                            remark: d.remarks || "-",
                            time: d.timestamp ? d.timestamp.toDate() : new Date(),
                            cls: "status-out"
                        });
                    });
                }

                allActivity.sort((a, b) => b.time - a.time);

                tbody.innerHTML = allActivity.map(item => `
                    <tr>
                        <td style="color:var(--text-muted)"><b>${item.time.toLocaleDateString()}</b><br>${item.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</td>
                        <td style="font-weight:700;">${item.user}</td>
                        <td>${item.userLoc}</td>
                        <td><span class="status-pill ${item.cls}">${item.type}</span></td>
                        <td style="font-family:monospace; font-weight:bold; color:var(--primary);">${item.asset}</td>
                        <td style="font-weight:600;">${item.route}</td>
                        <td><img src="${item.photo}" class="do-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3342/3342137.png'" onclick="window.open(this.src)"></td>
                        <td style="max-width:150px; font-size:12px; color:var(--text-muted);">${item.remark}</td>
                    </tr>
                `).join('');

                loading.style.display = "none";
                table.style.display = "table";

            } catch (error) {
                console.error("Firebase Error:", error);
                loading.innerHTML = `<span style="color:red;">Failed to Load: ${error.message}</span>`;
            }
        }

        window.onload = fetchActivity;
    </script>
</body>
</html>
