<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | User Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); display: flex; color: var(--text-main); }

        .sidebar { width: 260px; background-color: var(--sidebar-bg); height: 100vh; color: white; position: fixed; }
        .sidebar-header { padding: 30px 20px; text-align: center; font-size: 20px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-links { list-style: none; padding: 20px 0; margin: 0; }
        .nav-links li { margin: 4px 15px; border-radius: 10px; }
        .nav-links li.active { background: var(--primary); }
        .nav-links a { text-decoration: none; color: #94a3b8; padding: 14px 15px; display: flex; align-items: center; font-size: 14px; }
        .nav-links li.active a { color: white; }
        .nav-links i { margin-right: 12px; width: 20px; text-align: center; }

        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .table-container { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 10px 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; background: #fcfcfc; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        td:first-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; }

        /* Role Selector Styling */
        .role-select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            outline: none;
        }
        .role-select:focus { border-color: var(--primary); }

        .badge { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-Approved { background: #dcfce7; color: #15803d; }
        .status-Pending { background: #fef9c3; color: #854d0e; }
        .status-Blocked { background: #fee2e2; color: #b91c1c; }

        .btn-action { 
            padding: 6px 12px; border-radius: 6px; border: 1px solid #e2e8f0; 
            background: white; cursor: pointer; font-size: 12px; font-weight: 600; 
            transition: 0.2s; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-approve:hover { background: var(--success); color: white; border-color: var(--success); }
        .btn-block:hover { background: var(--danger); color: white; border-color: var(--danger); }

        #loading { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>

<body>
 <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="header-flex">
            <div>
                <h1 style="margin:0;">User Management</h1>
                <p style="color: var(--text-muted);">Assign roles and manage account status</p>
            </div>
            <button class="btn-action" onclick="fetchUsers()"><i class="fas fa-sync"></i> Refresh List</button>
        </div>

        <section class="table-container">
            <div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <table id="user-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Location</th>
                        <th>Assign Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchUsers() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('user-table');
            const tbody = document.getElementById('table-body');

            loading.style.display = "block";
            table.style.display = "none";
            tbody.innerHTML = "";

            try {
                const snap = await db.collection('users').orderBy('createdAt', 'desc').get();
                
                snap.forEach(doc => {
                    const u = doc.data();
                    const id = doc.id;
                    const currentRole = u.role || 'StockIn & out';
                    const statusClass = `status-${u.status || 'Pending'}`;
                    
                    const row = `
                        <tr>
                            <td><div style="font-weight:700;">${u.name}</div></td>
                            <td>${u.phone}</td>
                            <td>${u.city} (${u.branch})</td>
                            <td>
                                <select class="role-select" onchange="updateUserRole('${id}', this.value)">
                                    <option value="StockIn & out" ${currentRole === 'StockIn & out' ? 'selected' : ''}>StockIn & out</option>
                                    <option value="Stock Audit" ${currentRole === 'Stock Audit' ? 'selected' : ''}>Stock Audit</option>
                                    <option value="Both" ${currentRole === 'Both' ? 'selected' : ''}>Both</option>
                                    <option value="Admin" ${currentRole === 'Admin' ? 'selected' : ''}>Admin</option>
                                </select>
                            </td>
                            <td><span class="badge ${statusClass}">${u.status || 'Pending'}</span></td>
                            <td>
                                ${u.status !== 'Approved' ? 
                                    `<button class="btn-action btn-approve" onclick="updateUserStatus('${id}', 'Approved')">Approve</button>` : 
                                    `<button class="btn-action btn-block" onclick="updateUserStatus('${id}', 'Blocked')">Block</button>`
                                }
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                loading.style.display = "none";
                table.style.display = "table";

            } catch (error) {
                console.error("Error:", error);
            }
        }

        // --- UPDATE ROLE FUNCTION ---
        async function updateUserRole(userId, newRole) {
            try {
                await db.collection('users').doc(userId).update({
                    role: newRole
                });
                console.log(`Role updated to ${newRole} for ${userId}`);
                // Optional: show a small toast or notification
            } catch (error) {
                alert("Failed to update role: " + error.message);
            }
        }

        async function updateUserStatus(userId, newStatus) {
            if(confirm(`Set user to ${newStatus}?`)) {
                try {
                    await db.collection('users').doc(userId).update({ status: newStatus });
                    fetchUsers();
                } catch (error) {
                    alert(error.message);
                }
            }
        }

        window.onload = fetchUsers;
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
