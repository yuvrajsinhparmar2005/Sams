<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Bulk Excel Upload</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { margin: 20px 0; }
        button { background: #039be5; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk Upload to Firestore</h2>
    <p>Upload Excel file with <b>branch</b> and <b>city</b> columns.</p>
    
    <input type="file" id="excelFile" accept=".xlsx, .xls" />
    <br>
    <button id="uploadBtn">Upload to Firebase</button>
    
    <div id="status"></div>
</div>

<script>
    // 1. REPLACE THIS WITH YOUR FIREBASE CONFIG
       const firebaseConfig = {
        apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
        authDomain: "sams-e7c4b.firebaseapp.com",
        projectId: "sams-e7c4b",
        storageBucket: "sams-e7c4b.firebasestorage.app",
        messagingSenderId: "829551028089",
        appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('excelFile');
    const status = document.getElementById('status');

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) {
            alert("Please select a file first!");
            return;
        }

        status.innerText = "Processing file...";
        uploadBtn.disabled = true;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            // Get first sheet
            const sheetName = workbook.SheetNames[0];
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

            try {
                const batch = db.batch();
                let count = 0;

                jsonData.forEach((row) => {
                    // Create a new doc reference in 'showrooms' collection
                    const docRef = db.collection("locations").doc();
                    
                    // Map your Excel columns to Firestore fields
                    batch.set(docRef, {
                        branch: row.branch || "N/A",
                        city: row.city || "N/A"
                    });
                    count++;
                });

                await batch.commit();
                status.style.color = "green";
                status.innerText = `Success! ${count} records uploaded.`;
            } catch (error) {
                console.error(error);
                status.style.color = "red";
                status.innerText = "Error: " + error.message;
            } finally {
                uploadBtn.disabled = false;
            }
        };

        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
