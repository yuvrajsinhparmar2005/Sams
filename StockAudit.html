<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Stock Audit Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 2rem 3rem;
            min-height: 100vh;
        }

        /* Header UI - Glassmorphism */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--white);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .header-title h1 { margin: 0; font-size: 1.75rem; font-weight: 700; }
        .header-title p { margin: 0.25rem 0 0; color: var(--text-muted); font-size: 0.95rem; }

        .controls { display: flex; gap: 12px; align-items: center; }

        select {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--white);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        /* Table UI Card */
        .table-card {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            padding: 1.25rem 1.5rem;
            background: #f1f5f9;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
        }

        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background-color: #f8fafc; }

        /* Badge Styles */
        .barcode-badge {
            font-family: monospace;
            font-weight: 700;
            color: var(--primary);
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .audit-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }
        .audit-img:hover { transform: scale(1.1); }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        #loading { padding: 5rem; text-align: center; color: var(--primary); }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <header class="page-header">
            <div class="header-title">
                <h1>Stock Audit Logs</h1>
                <p>Manage archive records & clear current sessions</p>
            </div>
            
            <div class="controls">
                <select id="city-filter" onchange="resetPagination()">
                    <option value="">Filter City</option>
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Himmatnagar">Himmatnagar</option>
                </select>

                <button class="btn btn-danger" onclick="freezeAndClear()" id="freeze-btn">
                    <i class="fas fa-snowflake"></i> Freeze & Clear
                </button>

                <button class="btn btn-primary" onclick="resetPagination()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </header>

        <section class="table-card">
            <div id="loading" style="display: none;">
                <i class="fas fa-spinner fa-spin fa-3x"></i>
                <p style="margin-top:1rem; font-weight: 600;">Syncing Records...</p>
            </div>

            <table id="audit-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Barcode / Asset</th>
                        <th>Auditor</th>
                        <th>Location</th>
                        <th>Proof</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchAuditData() {
            const city = document.getElementById('city-filter').value;
            const tbody = document.getElementById('table-body');
            const loader = document.getElementById('loading');
            
            loader.style.display = 'block';
            document.getElementById('audit-table').style.opacity = '0.5';

            try {
                let query = db.collection('stock_audit').orderBy('timestamp', 'desc');
                if(city) query = query.where('auditLocation_City', '==', city);
                
                const snap = await query.limit(25).get();
                tbody.innerHTML = snap.empty ? "<tr><td colspan='6' style='text-align:center; padding: 40px;'>No records found.</td></tr>" : "";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const dateObj = d.timestamp ? d.timestamp.toDate() : new Date();
                    const fDate = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                    const fTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>
                                <div style="font-weight:700;">${fDate}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">${fTime}</div>
                            </td>
                            <td><span class="barcode-badge">${d.barcodeData || 'N/A'}</span></td>
                            <td><div style="font-weight:600;">${d.auditBy_Name || 'Unknown'}</div></td>
                            <td>
                                <div style="font-weight:600;">${d.auditLocation_City}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">${d.auditLocation_Branch || ''}</div>
                            </td>
                            <td><img src="${d.auditPhotoPath}" class="audit-img" onclick="window.open(this.src)" onerror="this.src='https://via.placeholder.com/48'"></td>
                            <td><div style="max-width:180px; font-size:0.85rem; line-height:1.4;">${d.remarks || '-'}</div></td>
                        </tr>
                    `);
                });
            } finally {
                loader.style.display = 'none';
                document.getElementById('audit-table').style.opacity = '1';
            }
        }

        async function freezeAndClear() {
            const city = document.getElementById('city-filter').value;
            const btn = document.getElementById('freeze-btn');
            const tbody = document.getElementById('table-body');
            
            if (!confirm(`Warning: This moves ${city || 'ALL'} records to local MySQL and WIPES Firebase. Continue?`)) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Archiving...';

            try {
                let query = db.collection('stock_audit');
                if(city) query = query.where('auditLocation_City', '==', city);
                const snap = await query.get();

                if(snap.empty) { alert("Nothing to move!"); return; }

                const records = [];
                const ids = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    records.push({ ...d, timestamp: d.timestamp ? d.timestamp.toDate().toISOString() : new Date().toISOString() });
                    ids.push(doc.id);
                });

                const response = await fetch('http://localhost/sams/StockAudit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(records)
                });

                const result = await response.json();

                if (result.status === "success") {
                    const batch = db.batch();
                    ids.forEach(id => batch.delete(db.collection('stock_audit').doc(id)));
                    await batch.commit();

                    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:60px; color:var(--success); font-weight:700; font-size:1.1rem;'><i class='fas fa-check-circle'></i> Data successfully frozen & cleared.</td></tr>";
                    alert("Success: " + result.message);
                } else {
                    alert("PHP Error: " + result.message);
                }
            } catch (err) {
                alert("Connection Error: Is XAMPP running?");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-snowflake"></i> Freeze & Clear';
            }
        }

        window.onload = fetchAuditData;
        function resetPagination() { fetchAuditData(); }
    </script>
    <script src="sidebar.js"></script>
</body>

</html>
