<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Stock Audit Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --audit-color: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); display: flex; color: var(--text-main); }

        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); height: 100vh; color: white; position: fixed; }
        .sidebar-header { padding: 30px 20px; text-align: center; font-size: 20px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-links { list-style: none; padding: 20px 0; margin: 0; }
        .nav-links li { margin: 4px 15px; border-radius: 10px; }
        .nav-links li.active { background: var(--primary); }
        .nav-links a { text-decoration: none; color: #94a3b8; padding: 14px 15px; display: flex; align-items: center; font-size: 14px; }
        .nav-links li.active a { color: white; }
        .nav-links i { margin-right: 12px; width: 20px; text-align: center; }

        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Table Design */
        .table-container { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; min-width: 900px; }
        th { text-align: left; padding: 10px 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; background: #fcfcfc; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        td:first-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; }

        /* Badges & Images */
        .method-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #e2e8f0; color: #475569; }
        .audit-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .audit-img:hover { transform: scale(1.1); border-color: var(--primary); }

        .btn-refresh { 
            padding: 8px 16px; border-radius: 8px; border: none; 
            background: var(--primary); color: white; cursor: pointer; font-weight: 600; 
            display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-refresh:hover { background: var(--primary-dark); }

        #loading { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>

<body>
   <aside style="width: 260px; background-color: #0f172a; height: 100vh; color: white; position: fixed; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1); z-index: 100; font-family: 'Inter', sans-serif;">
    <div style="padding: 40px 20px; text-align: center; font-size: 22px; font-weight: 800; letter-spacing: 3px; color: #ffffff; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">SAMS</div>
    <ul style="list-style: none; padding: 25px 0; margin: 0; flex-grow: 1;">
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="dashboard.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-chart-line" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Dashboard</a></li>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="StockIn-Out.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-exchange-alt" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Stock In & Out</a></li>
        <li style="margin: 8px 15px; border-radius: 12px; background-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);"><a href="StockAudit.html" style="text-decoration: none; color: white; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-clipboard-check" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center;"></i> Stock Audit</a></li>
        <div style="padding: 10px 30px; font-size: 11px; text-transform: uppercase; color: #475569; font-weight: 700; letter-spacing: 1px; margin-top: 20px;">Administration</div>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="AdminStockAudit.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-user-shield" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> Admin Audit</a></li>
         <li style="margin: 8px 15px; border-radius: 12px;">
            <a href="TVAdminStockAudit.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;">
                <i class="fas fa-user-shield" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> 
               True Value Admin Audit
            </a>
        </li>
        <li style="margin: 8px 15px; border-radius: 12px; ">
            <a href="Barcode.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;">
                <i class="fas fa-barcode" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center;"></i> 
                Barcode Download
            </a>
        </li>
        <li style="margin: 8px 15px; border-radius: 12px;"><a href="UserAccess.html" style="text-decoration: none; color: #94a3b8; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; font-weight: 500;"><i class="fas fa-users-cog" style="margin-right: 15px; font-size: 18px; width: 25px; text-align: center; opacity: 0.8;"></i> User Access</a></li>
    </ul>
</aside>

    <main class="main-content">
        <div class="header-flex">
            <div>
                <h1 style="margin:0;">Stock Audit Logs</h1>
                <p style="color: var(--text-muted);">View physical verification records and proof</p>
            </div>
            <button class="btn-refresh" onclick="fetchAuditData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
        </div>

        <section class="table-container">
            <div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <table id="audit-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Asset ID</th>
                        <th>Auditor</th>
                        <th>Location (Branch)</th>
                        <th>Method</th>
                        <th>Audit Proof</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchAuditData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('audit-table');
            const tbody = document.getElementById('table-body');

            loading.style.display = "block";
            table.style.display = "none";
            tbody.innerHTML = "";

            try {
                // Fetch from your 'stock_audit' collection
                const snap = await db.collection('stock_audit').orderBy('timestamp', 'desc').get();
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const dateObj = d.timestamp ? d.timestamp.toDate() : new Date();
                    
                    const row = `
                        <tr>
                            <td>
                                <b>${dateObj.toLocaleDateString()}</b><br>
                                <span style="font-size:12px; color:var(--text-muted)">${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </td>
                            <td style="font-family:monospace; font-weight:700; color:var(--primary);">${d.barcodeData}</td>
                            <td style="font-weight:600;">${d.auditBy_Name}</td>
                            <td>${d.auditLocation_City}<br><span style="font-size:12px; color:gray;">${d.auditLocation_Branch}</span></td>
                            <td><span class="method-badge">${d.entryMethod || 'Scanner'}</span></td>
                            <td>
                                <img src="${d.auditPhotoPath}" class="audit-img" 
                                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/3342/3342137.png'" 
                                     onclick="window.open(this.src)">
                            </td>
                            <td style="max-width:180px; font-size:12px; color:#4b5563;">${d.remarks || '-'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                loading.style.display = "none";
                table.style.display = "table";

                if (snap.empty) {
                    tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:30px;'>No audit records found.</td></tr>";
                }

            } catch (error) {
                console.error("Firebase Error:", error);
                loading.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
            }
        }

        window.onload = fetchAuditData;
    </script>
</body>
</html>
