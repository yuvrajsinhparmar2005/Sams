<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS | Stock Audit Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        /* Table Design */
        .table-container {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            min-width: 900px;
        }

        th {
            text-align: left;
            padding: 10px 15px;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            background: #fcfcfc;
            border-top: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            vertical-align: middle;
        }

        .method-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            background: #e2e8f0;
            color: #475569;
        }

        .audit-img {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }

        .audit-img:hover {
            transform: scale(1.1);
        }

        .btn-refresh,
        .btn-load-more {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-load-more {
            background: #64748b;
            margin: 20px auto;
            display: none;
        }

        .btn-load-more:hover {
            background: #475569;
        }

        .pagination-wrapper {
            text-align: center;
            width: 100%;
        }

        #loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>

<body>
   <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="header-flex"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="margin:0;">Stock Audit Logs</h1>
                <p style="color: var(--text-muted);">View verification records in batches</p>
            </div>
            <button class="btn-refresh" onclick="resetPagination()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <section class="table-container">
            <div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <table id="audit-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Asset ID</th>
                        <th>Auditor</th>
                        <th>Location</th>
                        <th>Method</th>
                        <th>Audit Proof</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="pagination-wrapper">
                <button id="load-more" class="btn-load-more" onclick="fetchAuditData()">Load More Records</button>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvhfKK1rqYhWhFXQasP-4JdcZBKzXegJ4",
            authDomain: "sams-e7c4b.firebaseapp.com",
            projectId: "sams-e7c4b",
            storageBucket: "sams-e7c4b.firebasestorage.app",
            messagingSenderId: "829551028089",
            appId: "1:829551028089:web:f5f66f18f6d0c4466b71a8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let lastVisible = null; // To keep track of the last document fetched
        const pageSize = 10;    // Number of records per page

        function resetPagination() {
            lastVisible = null;
            document.getElementById('table-body').innerHTML = "";
            fetchAuditData();
        }

        async function fetchAuditData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('audit-table');
            const tbody = document.getElementById('table-body');
            const loadMoreBtn = document.getElementById('load-more');

            // Show loading only on the first fetch
            if (!lastVisible) {
                loading.style.display = "block";
                table.style.display = "none";
            }
            loadMoreBtn.style.display = "none";

            try {
                let query = db.collection('stock_audit').orderBy('timestamp', 'desc').limit(pageSize);

                // If this isn't the first page, start after the last document fetched
                if (lastVisible) {
                    query = query.startAfter(lastVisible);
                }

                const snap = await query.get();

                if (snap.empty && !lastVisible) {
                    tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:30px;'>No records found.</td></tr>";
                } else {
                    snap.forEach(doc => {
                        const d = doc.data();
                        const dateObj = d.timestamp ? d.timestamp.toDate() : new Date();

                        const row = `
                            <tr>
                                <td>
                                    <b>${dateObj.toLocaleDateString()}</b><br>
                                    <span style="font-size:12px; color:var(--text-muted)">${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </td>
                                <td style="font-family:monospace; font-weight:700; color:var(--primary);">${d.barcodeData}</td>
                                <td style="font-weight:600;">${d.auditBy_Name}</td>
                                <td>${d.auditLocation_City}<br><span style="font-size:12px; color:gray;">${d.auditLocation_Branch}</span></td>
                                <td><span class="method-badge">${d.entryMethod || 'Scanner'}</span></td>
                                <td>
                                    <img src="${d.auditPhotoPath}" class="audit-img" 
                                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3342/3342137.png'" 
                                         onclick="window.open(this.src)">
                                </td>
                                <td style="max-width:180px; font-size:12px; color:#4b5563;">${d.remarks || '-'}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });

                    // Update lastVisible for the next fetch
                    lastVisible = snap.docs[snap.docs.length - 1];

                    // Show "Load More" only if we got a full page of results
                    if (snap.docs.length === pageSize) {
                        loadMoreBtn.style.display = "inline-flex";
                    }
                }

                loading.style.display = "none";
                table.style.display = "table";

            } catch (error) {
                console.error("Firebase Error:", error);
                loading.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
            }
        }

        window.onload = fetchAuditData;
    </script>
    <script src="sidebar.js"></script>
</body>

</html>
